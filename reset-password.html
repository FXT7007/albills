<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | AlBills</title>
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://www.albills.com/reset-password">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#161b27;--surface:#1e2638;--surface2:#252f47;--surface3:#2d3859;--border:rgba(130,160,255,0.12);--border2:rgba(130,160,255,0.2);--accent:#5b8dee;--accent2:#8b6fee;--accent3:#4dd9c0;--text:#e8eaf6;--text2:#9aabcc;--text3:#5a6b90;--green:#4dd9c0;--green-bg:rgba(77,217,192,0.1);--red:#ff6b7a;--red-bg:rgba(255,107,122,0.1);--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 40% at 15% 10%,rgba(91,141,238,0.07),transparent 60%),radial-gradient(ellipse 60% 50% at 85% 80%,rgba(139,111,238,0.05),transparent 60%)}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,0.4)}
.card::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));margin:-36px -32px 26px;border-radius:18px 18px 0 0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.logo-text{font-family:var(--font-d);font-weight:800;font-size:20px;color:#fff}
h1{font-family:var(--font-d);font-size:22px;font-weight:700;margin-bottom:6px}
.sub{color:var(--text2);font-size:14px;margin-bottom:22px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;font-family:var(--font-b);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--accent)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:13px;border-radius:10px;font-family:var(--font-b);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:6px}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,141,238,0.4)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5}
.msg.error{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,107,122,0.25);display:block}
.msg.success{background:var(--green-bg);color:var(--green);border:1px solid rgba(77,217,192,0.25);display:block}
.msg.info{background:rgba(91,141,238,0.08);color:var(--accent);border:1px solid rgba(91,141,238,0.25);display:block}
.fn{font-size:13px;color:var(--text3);text-align:center;margin-top:14px}
.fn a{color:var(--accent);text-decoration:none;cursor:pointer}
.req{font-size:11px;color:var(--text3);margin-top:5px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo"><div class="logo-icon">&#9889;</div><div class="logo-text">AlBills</div></div>
  <h1 id="title">Reset your password</h1>
  <p class="sub" id="sub">Verifying your reset link…</p>
  <div id="msg" class="msg"></div>

  <div id="form" style="display:none">
    <div class="fg">
      <label class="fl">New password</label>
      <input class="fi" type="password" id="pw1" placeholder="At least 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter'){event.preventDefault();doReset();}">
      <div class="req">At least 8 characters. Use a mix of letters, numbers, and symbols.</div>
    </div>
    <div class="fg">
      <label class="fl">Confirm new password</label>
      <input class="fi" type="password" id="pw2" placeholder="Repeat your new password" autocomplete="new-password" onkeydown="if(event.key==='Enter'){event.preventDefault();doReset();}">
    </div>
    <button class="btn" id="saveBtn" onclick="doReset()">Save new password</button>
  </div>

  <div class="fn"><a href="/">Back to AlBills</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://bynkbsuphhyxsnnbftoa.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5bmtic3VwaGh5eHNubmJmdG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjg0NjAsImV4cCI6MjA5MDMwNDQ2MH0.YkikdYvLP_afw3B2t_qM1EESFjZ6n2kCxGa8NDxDNzU';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const msgEl  = document.getElementById('msg');
const subEl  = document.getElementById('sub');
const formEl = document.getElementById('form');
function showMsg(text, kind){ msgEl.textContent = text; msgEl.className = 'msg ' + kind; }

let recoveryReady = false;

// Supabase fires a PASSWORD_RECOVERY event when the user lands here from the
// reset-password email link. The session it creates is short-lived and lets
// us call updateUser({password}) without re-authenticating.
supa.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (session && session.user && !recoveryReady)) {
    recoveryReady = true;
    subEl.textContent = 'Choose a new password for ' + (session?.user?.email || 'your account') + '.';
    formEl.style.display = 'block';
    msgEl.className = 'msg';
    document.getElementById('pw1').focus();
  }
});

// If 5s pass with no recovery event, the link is invalid or expired
setTimeout(() => {
  if (!recoveryReady) {
    subEl.textContent = '';
    showMsg('This reset link is invalid or has expired. Request a new one from the sign-in page.', 'error');
  }
}, 5000);

async function doReset(){
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
  if (pw1 !== pw2)    return showMsg('Passwords don’t match. Please retype them.', 'error');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const {error} = await supa.auth.updateUser({password: pw1});
  btn.disabled = false; btn.textContent = 'Save new password';
  if (error) return showMsg(error.message, 'error');
  formEl.style.display = 'none';
  showMsg('✅ Password updated. Redirecting to sign in…', 'success');
  await supa.auth.signOut();
  setTimeout(() => { window.location.href = '/?signin=1'; }, 1800);
}
</script>
</body>
</html>
